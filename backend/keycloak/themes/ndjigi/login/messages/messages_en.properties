termsText=<div class="ndjigi-terms"><p class="ndjigi-terms-intro">By creating an N'DJIGI account, you agree to the essential rules below.</p><h2>Use of the service</h2><p>You agree to provide accurate information, protect your credentials and use the platform lawfully and respectfully.</p><h2>Transport and safety</h2><p>Users, drivers and partners must comply with safety rules, regulatory obligations and instructions applicable to each trip.</p><h2>Payments</h2><p>Prices, fees and any cancellation terms are shown before confirmation. Payments are processed according to the selected method.</p><h2>Personal data</h2><p>Data required to operate, secure and improve the service is processed under N'DJIGI's privacy policy.</p><h2>Account and responsibility</h2><p>N'DJIGI may restrict an account in cases of fraud, abuse or breach of these rules. You remain responsible for actions performed through your account.</p><p class="ndjigi-terms-note">This summary must be replaced or approved by the official legal version before production.</p></div>
