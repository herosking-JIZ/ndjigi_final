termsText=<div class="ndjigi-terms"><p class="ndjigi-terms-intro">En créant un compte N'DJIGI, vous acceptez les règles essentielles ci-dessous.</p><h2>Utilisation du service</h2><p>Vous vous engagez à fournir des informations exactes, à protéger vos accès et à utiliser la plateforme de manière légale et respectueuse.</p><h2>Transport et sécurité</h2><p>Les utilisateurs, chauffeurs et partenaires doivent respecter les règles de sécurité, les obligations réglementaires et les consignes applicables à chaque trajet.</p><h2>Paiements</h2><p>Les tarifs, frais et éventuelles conditions d'annulation sont présentés avant validation. Les opérations de paiement sont traitées selon le moyen sélectionné.</p><h2>Données personnelles</h2><p>Les données nécessaires au fonctionnement, à la sécurité et à l'amélioration du service sont traitées conformément à la politique de confidentialité de N'DJIGI.</p><h2>Compte et responsabilité</h2><p>N'DJIGI peut restreindre un compte en cas de fraude, d'abus ou de non-respect de ces règles. Vous restez responsable des actions réalisées avec votre compte.</p><p class="ndjigi-terms-note">Ce résumé doit être remplacé ou validé par la version juridique officielle avant la mise en production.</p></div>
