termsText=<div style="font-family: Arial, sans-serif; padding: 10px;">\
<h2>Conditions Générales d'Utilisation — N'DJIGI</h2>\
<p><strong>Dernière mise à jour : Juin 2025</strong></p>\
\
<h3>1. Objet</h3>\
<p>N'DJIGI est une application de mobilité urbaine permettant la mise en relation \
entre passagers, chauffeurs et propriétaires de véhicules au Burkina Faso.</p>\
\
<h3>2. Acceptation des conditions</h3>\
<p>En utilisant N'DJIGI, vous acceptez les présentes CGU dans leur intégralité. \
Si vous n'acceptez pas ces conditions, vous ne pouvez pas utiliser l'application.</p>\
\
<h3>3. Inscription et compte</h3>\
<p>Vous devez fournir des informations exactes lors de votre inscription. \
Vous êtes responsable de la confidentialité de vos identifiants de connexion.</p>\
\
<h3>4. Utilisation du service</h3>\
<p>L'application est destinée à un usage personnel et non commercial. \
Toute utilisation frauduleuse entraîne la suspension immédiate du compte.</p>\
\
<h3>5. Responsabilités</h3>\
<p>N'DJIGI agit en tant qu'intermédiaire entre les utilisateurs. \
La société décline toute responsabilité en cas d'incident entre utilisateurs.</p>\
\
<h3>6. Données personnelles</h3>\
<p>Vos données sont collectées et traitées conformément à notre politique de \
confidentialité. Elles ne sont jamais vendues à des tiers.</p>\
\
<h3>7. Contact</h3>\
<p>Pour toute question : support@ndjigi.app</p>\
</div>