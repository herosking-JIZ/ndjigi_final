services:
  # PostgreSQL Database
  postgres:
    image: postgres:16-alpine
    container_name: ndjigi-postgres
    environment:
      POSTGRES_USER: ndjigi_user
      POSTGRES_PASSWORD: "1234567890"
      POSTGRES_DB: ndjigi_db
      POSTGRES_INITDB_ARGS: "--encoding=UTF8 --locale=en_US.UTF-8"
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docker-init/init-databases.sql:/docker-entrypoint-initdb.d/init.sql
    networks:
      - ndjigi-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ndjigi_user -d ndjigi_db"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # Keycloak Identity Provider
  keycloak:
    image: keycloak/keycloak:latest
    container_name: ndjigi-keycloak
    environment:
      KEYCLOAK_ADMIN: admin
      KEYCLOAK_ADMIN_PASSWORD: Admin123456
      KC_DB: postgres
      KC_DB_URL: jdbc:postgresql://postgres:5432/keycloak_db
      KC_DB_USERNAME: ndjigi_user
      KC_DB_PASSWORD: "1234567890"
      KC_HOSTNAME_STRICT: false
      KC_PROXY_HEADERS: xforwarded
      KC_HTTP_ENABLED: true
      KC_FEATURES: declarative-ui

    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./backend/keycloak/themes/ndjigi:/opt/keycloak/themes/ndjigi

    networks:
      - ndjigi-network
    command:
      - start-dev
    restart: unless-stopped

  # Backend Node.js/Express
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: ndjigi-backend
    user: "${UID:-1000}:${GID:-1000}"
    environment:
      NODE_ENV: development
      PORT: 8000
      DATABASE_URL: "postgresql://ndjigi_user:1234567890@postgres:5432/ndjigi_db"

      # Keycloak Configuration
      KEYCLOAK_URL: http://keycloak:8080
      KEYCLOAK_REALM: ndjigi
      KEYCLOAK_CLIENT_ID: ndjigi-backend
      KEYCLOAK_CLIENT_SECRET: wpvolJYIcicBKlDol6qp6TK2MvC2ymUdkN8nmMg70GOt1Qh1Vk2SDnr5ArZ8rONksaYHjiLv4TKHAZMP39XiYP
      KEYCLOAK_ALLOWED_ISSUERS: http://keycloak:8080/realms/ndjigi,http://192.168.11.104:8080/realms/ndjigi,http://10.0.2.2:8080/realms/ndjigi,http://localhost:8080/realms/ndjigi
      # JWT Configuration (rétrocompatibilité)
      JWT_SECRET: change_this_secret_key
      JWT_REFRESH_SECRET: change_this_refresh_secret
      JWT_EXPIRES_IN: 15m
      JWT_REFRESH_EXPIRES_IN: 7d

      # CORS
      CORS_ORIGIN: http://localhost:3000,http://localhost:8081,http://web:3000,http://192.168.11.104:3000

      # Redis (Phase 0+)
      REDIS_URL: redis://redis:6379
      REDIS_SOCKET_URL: redis://redis:6379/1

      # Fallback MVP tant que la zone n'est pas résolue depuis les coordonnées.
      VTC_DEFAULT_ZONE_ID: df272587-7f5b-4696-82c7-b8625d5a48cf
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      keycloak:
        condition: service_started
      redis:
        condition: service_healthy
    volumes:
      - ./backend:/app
      - /app/node_modules
    networks:
      - ndjigi-network
    command: sh -c "npx prisma migrate deploy && npm run dev"
    restart: unless-stopped

  # Web Frontend (React + Vite)
  web:
    build:
      context: ./web/n-djigi
      dockerfile: Dockerfile
      args:
        VITE_API_URL: http://192.168.11.104:8000/api/v1
        VITE_KEYCLOAK_URL: http://192.168.11.104:8080
        VITE_KEYCLOAK_REALM: ndjigi
        VITE_KEYCLOAK_CLIENT_ID: ndjigi-web
    container_name: ndjigi-web
    ports:
      - "3000:3000"
    depends_on:
      - backend
    networks:
      - ndjigi-network
    restart: unless-stopped

  # Redis for token blacklist, rate limiting, OTP codes
  redis:
    image: redis:7-alpine
    container_name: ndjigi-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - ndjigi-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local

networks:
  ndjigi-network:
    driver: bridge
